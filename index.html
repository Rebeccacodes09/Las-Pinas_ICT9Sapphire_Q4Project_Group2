<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4Q Project</title>

  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-page">

<div class="container d-flex justify-content-center align-items-center vh-100">
    
    <div class="login-box text-center p-4">
        <img src="logo.png" alt="Logo" class="logo mb-2">
        <h1 class="mb-3">Login</h1>

        <p>Enter your username and password.</p>

     
        <p class="small text-muted">Demo: janedoe / 1234</p>

        <form onsubmit="authenticate(); return false;">
            
            <input type="text" id="uname" class="form-control mb-3" placeholder="Enter username" required>

            <input type="password" id="pass" class="form-control mb-3" placeholder="Enter password" required>

            <div class="form-check text-start mb-3">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label">Stay logged in</label>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary w-50">Login</button>
                <button type="button" class="btn btn-outline-secondary w-50" onclick="clearFields()">Cancel</button>
            </div>

        </form>

       
        <p id="attemptsText" class="mt-3 text-danger"></p>

        <p class="mt-2">
            <a href="#">Forgot username / password?</a>
        </p>

    </div>

</div>

<footer class="text-center p-3 mt-5 text-muted">
    Group 2 | Grade 9
</footer>

<script src="main.js"></script>

</body>
</html>
